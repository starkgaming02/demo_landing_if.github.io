<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instituto Fleming - Tu Futuro Empieza Aquí</title>

    <!-- Tailwind CDN (debe cargarse desde el inicio, NO vía fetch) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <!-- Fuentes e iconos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

    <!-- Tailwind config -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#8C1515",
              "primary-hover": "#6e1010",
              secondary: "#3277AE",
              "brand-dark": "#002147",
              "background-light": "#F9FAFB",
              "background-dark": "#111827",
              "surface-light": "#FFFFFF",
              "surface-dark": "#1F2937",
              "text-light": "#1F2937",
              "text-dark": "#F3F4F6",
              "secondary-text-light": "#4B5563",
              "secondary-text-dark": "#9CA3AF",
            },
            fontFamily: {
              display: ["Montserrat", "sans-serif"],
              body: ["Montserrat", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              xl: "1rem",
              "2xl": "1.5rem",
            },
            boxShadow: {
              soft: "0 4px 20px -2px rgba(0, 0, 0, 0.1)",
              glow: "0 0 15px rgba(140, 21, 21, 0.3)",
            },
          },
        },
      };
    </script>

    <!-- Tu CSS custom -->
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>

  <body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark font-body antialiased transition-colors duration-300">
    <header data-include="partials/nav.html"></header>

    <main>
      <section data-include="partials/hero.html"></section>
      <section data-include="partials/promo-cards.html"></section>
      <section data-include="partials/oferta-educativa.html"></section>
      <section data-include="partials/planteles.html"></section>
      <section data-include="partials/stats.html"></section>
      <section data-include="partials/lead-form.html"></section>
    </main>

    <footer data-include="partials/footer.html"></footer>

    <div id="n8n-chat"></div>

    <!-- main.js es module porque importa render-sections -->
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/n8n-chat.js"></script>
  </body>
</html>
